<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning ADN Camper</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
header{background:#111827;color:white;padding:16px;text-align:center}
.container{padding:12px;max-width:1700px;margin:auto}
.card{background:white;border-radius:16px;padding:12px;margin-bottom:12px;box-shadow:0 4px 14px #0002}
.topbar{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}
button{background:#111827;color:white;border:0;border-radius:10px;padding:10px 14px;font-weight:bold;cursor:pointer}
button.secondary{background:#2563eb}
button.green{background:#16a34a}
button.orange{background:#f97316}
button.danger{background:#dc2626}
button.small{padding:5px 8px;font-size:12px;margin-top:4px}
select,input,textarea{width:100%;padding:11px;border-radius:10px;border:1px solid #d1d5db;font-size:15px;box-sizing:border-box}
textarea{min-height:90px}
.legend,.charge{display:flex;gap:10px;flex-wrap:wrap}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:5px}
.chargebox{padding:8px 10px;border-radius:10px;background:#f3f4f6;font-weight:bold}
.ok{background:#dcfce7;color:#166534}
.warn{background:#fef3c7;color:#92400e}
.full{background:#fee2e2;color:#991b1b}

.agenda-wrap{overflow-x:auto}
.agenda{display:grid;grid-template-columns:70px repeat(6,minmax(170px,1fr));min-width:1150px;position:relative}
.agenda-header{background:#111827;color:white;padding:10px;text-align:center;border-radius:10px;margin:2px;font-weight:bold}
.hour-cell{height:48px;background:#e5e7eb;border-radius:8px;margin:2px;display:flex;align-items:flex-start;justify-content:center;font-weight:bold;font-size:13px;padding-top:4px;box-sizing:border-box}
.day-cell{height:48px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;margin:2px;cursor:pointer;box-sizing:border-box}
.day-cell:hover{outline:2px dashed #2563eb;background:#eff6ff}
.closed-cell{height:32px;background:#f3f4f6;border:1px dashed #9ca3af;border-radius:8px;margin:2px;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:12px;font-weight:bold}
.event{position:absolute;left:6px;right:6px;border-radius:10px;padding:8px;font-size:13px;box-shadow:0 2px 8px #0003;cursor:pointer;z-index:5;overflow:hidden;box-sizing:border-box}
.event b{font-size:14px}
.Maxime{background:#bfdbfe;border-left:5px solid #2563eb}
.Joël{background:#bbf7d0;border-left:5px solid #16a34a}
.Guillaume{background:#fed7aa;border-left:5px solid #f97316}
.Gaël{background:#fecaca;border-left:5px solid #dc2626}
.badge{display:inline-block;padding:3px 7px;border-radius:999px;background:#e5e7eb;font-size:12px;margin:2px}

.modal{display:none;position:fixed;inset:0;background:#0008;z-index:99;align-items:center;justify-content:center;padding:12px}
.modal-content{background:white;border-radius:18px;padding:18px;max-width:900px;width:100%;box-shadow:0 10px 30px #0005;max-height:90vh;overflow:auto}
.formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.actions button{flex:1;min-width:120px}

.courtoisie-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.courtoisie-day{background:#f9fafb;border-radius:12px;padding:10px;border:1px solid #e5e7eb}
.courtoisie-line{padding:8px;border-radius:10px;margin:6px 0}
.libre{background:#dcfce7;color:#166534}
.occupe{background:#fee2e2;color:#991b1b}

@media(max-width:700px){
  .agenda{grid-template-columns:60px repeat(6,145px);min-width:930px}
  .event{font-size:12px}
}
</style>
</head>

<body>

<header>
  <h1>Planning ADN Camper</h1>
  <p>Vue semaine atelier • SMS client • Pause 12h-14h</p>
</header>

<div class="container">

  <div class="card topbar">
    <button onclick="changerSemaine(-7)">← Semaine précédente</button>
    <button class="secondary" onclick="aujourdhui()">Aujourd'hui</button>
    <button onclick="changerSemaine(7)">Semaine suivante →</button>
    <button class="secondary" onclick="ouvrirFormulaire()">+ Ajouter RDV</button>
    <button class="green" onclick="ouvrirCourtoisie()">🚗 Courtoisie</button>

    <select id="filtreTech" style="width:auto" onchange="afficher()">
      <option value="Tous">Tous les techniciens</option>
      <option>Maxime</option>
      <option>Joël</option>
      <option>Guillaume</option>
      <option>Gaël</option>
      <option value="Courtoisie">Avec véhicule courtoisie</option>
    </select>

    <strong id="titreSemaine"></strong>
  </div>

  <div class="card legend">
    <span><span class="dot" style="background:#2563eb"></span>Maxime</span>
    <span><span class="dot" style="background:#16a34a"></span>Joël</span>
    <span><span class="dot" style="background:#f97316"></span>Guillaume</span>
    <span><span class="dot" style="background:#dc2626"></span>Gaël</span>
    <span><b>Fermé :</b> 12h00 → 14h00</span>
  </div>

  <div class="card charge" id="chargeAtelier"></div>

  <div class="card agenda-wrap">
    <div id="agenda" class="agenda"></div>
  </div>

</div>

<div id="modalForm" class="modal">
  <div class="modal-content">
    <h2 id="formTitle">Ajouter un rendez-vous</h2>

    <div class="formgrid">
      <select id="civilite">
        <option value="">Civilité</option>
        <option>Monsieur</option>
        <option>Madame</option>
      </select>

      <input id="client" placeholder="Nom client *">
      <input id="telephone" type="tel" inputmode="tel" placeholder="Téléphone mobile client">
      <input id="vehicule" placeholder="Véhicule">
      <input id="date" type="date">
      <input id="heure" type="time">
      <select id="duree"></select>

      <select id="technicien">
        <option value="">Technicien *</option>
        <option>Maxime</option>
        <option>Joël</option>
        <option>Guillaume</option>
        <option>Gaël</option>
      </select>

      <select id="courtoisie">
        <option>Aucun</option>
        <option>Berlingo</option>
        <option>208</option>
        <option>Up</option>
      </select>

      <select id="statut">
        <option>À faire</option>
        <option>En cours</option>
        <option>Terminé</option>
        <option>En attente pièces</option>
      </select>
    </div>

    <textarea id="travaux" placeholder="Travaux à réaliser"></textarea>

    <div class="actions">
      <button onclick="fermerFormulaire()">Annuler</button>
      <button class="secondary" onclick="enregistrerFormulaire()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="modalDetail" class="modal">
  <div class="modal-content">
    <h2>Détails du rendez-vous</h2>
    <div id="detailContent"></div>

    <div class="actions">
      <button onclick="fermerDetail()">Fermer</button>
      <button class="secondary" onclick="modifierDepuisDetail()">✏️ Modifier</button>
      <button class="green" onclick="smsConfirmation()">📲 SMS RDV</button>
      <button class="orange" onclick="smsVehiculePret()">🚐 Véhicule prêt</button>
      <button class="danger" onclick="supprimerRDV()">Supprimer</button>
    </div>
  </div>
</div>

<div id="modalCourtoisie" class="modal">
  <div class="modal-content">
    <h2>🚗 Disponibilités véhicules de courtoisie</h2>
    <div id="courtoisieContent" class="courtoisie-grid"></div>
    <div class="actions">
      <button onclick="fermerCourtoisie()">Fermer</button>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyxITbrdJyGvjWeXWCWA_TFDS7x4Khpeo8jNp4UhEJRjY_le2NDumuHhR-Qkvfeg0-X/exec";

let interventions = [];
let dateBase = new Date();
let rdvSelectionne = null;
let modeEdition = false;
let editionId = null;

const joursNoms = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const techniciens = ["Maxime","Joël","Guillaume","Gaël"];
const vehiculesCourtoisie = ["Berlingo","208","Up"];

const heures = [
  "08:30","09:00","09:30","10:00","10:30","11:00","11:30",
  "12:00",
  "14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00"
];

const SLOT_HEIGHT = 52;

function remplirDurees(){
  const select = document.getElementById("duree");
  select.innerHTML = "";

  for(let h=0.5; h<=50; h+=0.5){
    const o=document.createElement("option");
    o.value=h.toString();
    o.textContent = h===0.5 ? "30 min" : h%1===0 ? h+"h" : Math.floor(h)+"h30";
    select.appendChild(o);
  }

  select.value="1";
}

function formatDuree(v){
  const h=Number(v||0);
  if(h===0.5)return"30 min";
  if(h%1===0)return h+"h";
  return Math.floor(h)+"h30";
}

function normaliserHeure(v){
  if(!v)return"";

  if(typeof v==="string"){
    const m=v.match(/(\d{1,2}):(\d{2})/);
    if(m)return String(m[1]).padStart(2,"0")+":"+m[2];
  }

  const d=new Date(v);
  if(!isNaN(d)){
    return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
  }

  return"";
}

function normaliserDate(v){
  if(!v)return"";

  if(typeof v==="string"){
    if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;

    const fr=v.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if(fr)return fr[3]+"-"+fr[2]+"-"+fr[1];
  }

  const d=new Date(v);
  if(isNaN(d))return"";

  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function dateObj(str){
  const [y,m,d]=str.split("-").map(Number);
  return new Date(y,m-1,d);
}

function formatDate(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function formatFR(d){
  return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});
}

function minutesDepuisMinuit(h){
  const p=h.split(":");
  return Number(p[0])*60+Number(p[1]);
}

function heureDepuisMinutes(min){
  const h=Math.floor(min/60);
  const m=min%60;
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}

function lundiDeLaSemaine(date){
  const d=new Date(date);
  const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);
  return new Date(d.setDate(diff));
}

function prochainJourOuvre(d){
  const n=new Date(d);
  do{
    n.setDate(n.getDate()+1);
  }while(n.getDay()===0);
  return n;
}

function ajusterHeureOuverture(heureMin){
  if(heureMin < 510) return 510;
  if(heureMin >= 720 && heureMin < 840) return 840;
  return heureMin;
}

function genererSegments(rdv){
  let segments=[];
  let restant=Number(rdv.duree||1)*60;
  let jour=dateObj(rdv.date);
  let heureMin=minutesDepuisMinuit(rdv.heure);

  while(restant>0 && segments.length<40){

    if(jour.getDay()===0){
      jour=prochainJourOuvre(jour);
      heureMin=510;
      continue;
    }

    heureMin = ajusterHeureOuverture(heureMin);

    if(heureMin >= 1080){
      jour=prochainJourOuvre(jour);
      heureMin=510;
      continue;
    }

    let limite = heureMin < 720 ? 720 : 1080;
    let dispo = limite - heureMin;
    let pris = Math.min(restant, dispo);

    if(pris > 0){
      segments.push({
        id:rdv.id,
        rdv:rdv,
        date:formatDate(jour),
        heure:heureDepuisMinutes(heureMin),
        minutes:pris
      });

      restant -= pris;
      heureMin += pris;
    } else {
      if(heureMin < 840){
        heureMin = 840;
      } else {
        jour=prochainJourOuvre(jour);
        heureMin=510;
      }
    }
  }

  return segments;
}

function chargerPlanning(){
  fetch(API_URL+"?t="+Date.now())
    .then(r=>r.json())
    .then(data=>{
      interventions=data.map(x=>({
        id:x.ID,
        date:normaliserDate(x.Date),
        heure:normaliserHeure(x.Heure),
        client:x.Client,
        vehicule:x["Véhicule"],
        telephone:formaterTelephoneSMS(x["Téléphone"]),
        travaux:x.Travaux,
        technicien:x.Technicien,
        duree:Number(String(x["Durée"]).replace(",","."))||1,
        courtoisie:x.Courtoisie,
        statut:x.Statut,
        civilite:x.Civilite || x["Civilité"] || "",
        smsConfirmation:x.SmsConfirmation || "",
        smsRappel:x.SmsRappel || "",
        smsPret:x.SmsPret || ""
      })).filter(x=>x.date&&x.heure);

      afficher();
    })
    .catch(()=>alert("Impossible de charger le planning Google Sheets."));
}

function afficher(){
  const lundi=lundiDeLaSemaine(dateBase);
  const agenda=document.getElementById("agenda");
  agenda.innerHTML="";

  const fin=new Date(lundi);
  fin.setDate(lundi.getDate()+5);

  document.getElementById("titreSemaine").innerText="Semaine du "+formatFR(lundi)+" au "+formatFR(fin);

  let dates=[];

  agenda.innerHTML+=`<div class="agenda-header">Heure</div>`;

  for(let i=0;i<6;i++){
    const j=new Date(lundi);
    j.setDate(lundi.getDate()+i);

    const dt=formatDate(j);
    dates.push(dt);

    agenda.innerHTML+=`<div class="agenda-header">${joursNoms[i]}<br>${formatFR(j)}</div>`;
  }

  heures.forEach(h=>{
    if(h==="12:00"){
      agenda.innerHTML+=`<div class="hour-cell">12h-14h</div>`;
      dates.forEach(()=>{
        agenda.innerHTML+=`<div class="closed-cell">FERMÉ</div>`;
      });
      return;
    }

    agenda.innerHTML+=`<div class="hour-cell">${h}</div>`;

    dates.forEach(dt=>{
      agenda.innerHTML+=`
        <div class="day-cell"
          ondragover="event.preventDefault()"
          ondrop="deposerRDV(event,'${dt}','${h}')"
          onclick="ouvrirDepuisCreneau('${dt}','${h}')">
        </div>`;
    });
  });

  afficherCharge(dates);
  setTimeout(()=>placerEvenements(dates),0);
}

function rdvVisible(r){
  const f=document.getElementById("filtreTech").value;

  if(f==="Tous")return true;
  if(f==="Courtoisie")return r.courtoisie&&r.courtoisie!=="Aucun";

  return r.technicien===f;
}

function placerEvenements(dates){
  const agenda=document.getElementById("agenda");
  const cells=agenda.querySelectorAll(".day-cell");

  interventions.filter(rdvVisible).forEach(r=>{
    const segments=genererSegments(r).filter(s=>dates.includes(s.date));

    segments.forEach(seg=>{
      const dayIndex=dates.indexOf(seg.date);
      const heuresSansFermeture = heures.filter(h=>h!=="12:00");
      const hIndex = heuresSansFermeture.indexOf(seg.heure);

      if(dayIndex<0||hIndex<0)return;

      const cell=cells[hIndex*6+dayIndex];
      if(!cell)return;

      const rectA=agenda.getBoundingClientRect();
      const rectC=cell.getBoundingClientRect();

      const ev=document.createElement("div");
      ev.className="event "+(r.technicien||"");
      ev.draggable=true;
      ev.ondragstart=e=>e.dataTransfer.setData("text/plain",String(r.id));

      ev.style.top=(rectC.top-rectA.top+agenda.scrollTop+2)+"px";
      ev.style.left=(rectC.left-rectA.left+agenda.scrollLeft+2)+"px";
      ev.style.width=(rectC.width-4)+"px";
      ev.style.height=Math.max(44,(seg.minutes/30)*SLOT_HEIGHT-6)+"px";

      ev.innerHTML=`
        <b>${seg.heure} - ${r.client||""}</b><br>
        ${r.vehicule||""}<br>
        ${r.travaux||""}<br>
        <span class="badge">${r.technicien||""}</span>
        <span class="badge">${formatDuree(r.duree)}</span>
        ${r.courtoisie&&r.courtoisie!=="Aucun"?`<span class="badge">🚗 ${r.courtoisie}</span>`:""}<br>
        <button class="secondary small" onclick="event.stopPropagation();ouvrirModification('${r.id}')">✏️ Modifier</button>
      `;

      ev.onclick=e=>{
        e.stopPropagation();
        ouvrirDetail(String(r.id));
      };

      ev.ondblclick=e=>{
        e.stopPropagation();
        ouvrirModification(String(r.id));
      };

      agenda.appendChild(ev);
    });
  });
}

function afficherCharge(dates){
  const box=document.getElementById("chargeAtelier");
  const auj=dates[0];

  box.innerHTML="";

  techniciens.forEach(t=>{
    const h=chargeJour(t,auj);
    const cls=h>=7?"full":h>=5?"warn":"ok";

    box.innerHTML+=`<div class="chargebox ${cls}">${t} : ${formatDuree(h)} / 7h</div>`;
  });
}

function ouvrirDepuisCreneau(d,h){
  modeEdition=false;
  editionId=null;

  document.getElementById("formTitle").innerText="Ajouter un rendez-vous";

  viderFormulaire();

  date.value=d;
  heure.value=h;

  modalForm.style.display="flex";
}

function ouvrirFormulaire(){
  modeEdition=false;
  editionId=null;

  document.getElementById("formTitle").innerText="Ajouter un rendez-vous";

  viderFormulaire();

  modalForm.style.display="flex";
}

function ouvrirModification(id){
  const r=interventions.find(x=>String(x.id)===String(id));

  if(!r)return;

  modeEdition=true;
  editionId=r.id;
  rdvSelectionne=r;

  document.getElementById("formTitle").innerText="Modifier le rendez-vous";

  civilite.value=r.civilite||"";
  client.value=r.client||"";
  telephone.value=r.telephone||"";
  vehicule.value=r.vehicule||"";
  travaux.value=r.travaux||"";
  date.value=r.date||"";
  heure.value=r.heure||"";
  duree.value=String(r.duree||1);
  technicien.value=r.technicien||"";
  courtoisie.value=r.courtoisie||"Aucun";
  statut.value=r.statut||"À faire";

  modalDetail.style.display="none";
  modalForm.style.display="flex";
}

function fermerFormulaire(){
  modalForm.style.display="none";
}

function viderFormulaire(){
  civilite.value="";
  client.value="";
  telephone.value="";
  vehicule.value="";
  travaux.value="";
  date.value="";
  heure.value="";
  duree.value="1";
  technicien.value="";
  courtoisie.value="Aucun";
  statut.value="À faire";
}

function lireForm(){
  return{
    id:modeEdition?editionId:Date.now(),
    civilite:civilite.value,
    client:client.value.trim(),
    telephone:formaterTelephoneSMS(telephone.value),
    vehicule:vehicule.value.trim(),
    travaux:travaux.value.trim(),
    date:date.value,
    heure:normaliserHeure(heure.value),
    duree:Number(duree.value),
    technicien:technicien.value,
    courtoisie:courtoisie.value,
    statut:statut.value
  };
}

function enregistrerFormulaire(){
  modeEdition ? modifierRDV() : ajouter();
}

function ajouter(){
  const item=lireForm();

  if(!item.client||!item.date||!item.heure||!item.technicien){
    alert("Il faut au minimum client, date, heure et technicien.");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      ID:item.id,
      Civilite:item.civilite,
      Date:item.date,
      Heure:item.heure,
      Client:item.client,
      "Véhicule":item.vehicule,
      "Téléphone":item.telephone,
      Travaux:item.travaux,
      Technicien:item.technicien,
      "Durée":item.duree,
      Courtoisie:item.courtoisie,
      Statut:item.statut
    })
  })
  .then(()=>{
    fermerFormulaire();
    setTimeout(chargerPlanning,800);
  })
  .catch(()=>alert("Erreur lors de l'enregistrement."));
}

function modifierRDV(){
  const item=lireForm();

  if(!item.client||!item.date||!item.heure||!item.technicien){
    alert("Il faut au minimum client, date, heure et technicien.");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"update",
      OldID:editionId,
      ID:item.id,
      Civilite:item.civilite,
      Date:item.date,
      Heure:item.heure,
      Client:item.client,
      "Véhicule":item.vehicule,
      "Téléphone":item.telephone,
      Travaux:item.travaux,
      Technicien:item.technicien,
      "Durée":item.duree,
      Courtoisie:item.courtoisie,
      Statut:item.statut
    })
  })
  .then(()=>{
    fermerFormulaire();
    fermerDetail();
    setTimeout(chargerPlanning,800);
  })
  .catch(()=>alert("Erreur lors de la modification."));
}

function deposerRDV(e,d,h){
  const id=e.dataTransfer.getData("text/plain");
  const r=interventions.find(x=>String(x.id)===String(id));

  if(!r)return;

  rdvSelectionne=r;
  modeEdition=true;
  editionId=r.id;

  civilite.value=r.civilite||"";
  client.value=r.client||"";
  telephone.value=r.telephone||"";
  vehicule.value=r.vehicule||"";
  travaux.value=r.travaux||"";
  date.value=d;
  heure.value=h;

}

function supprimerRDV(){
  if(!rdvSelectionne)return;

  if(!confirm("Supprimer ce RDV partout ?"))return;

  fetch(API_URL+"?action=delete&id="+encodeURIComponent(rdvSelectionne.id)+"&t="+Date.now())
    .then(r=>r.json())
    .then(res=>{
      if(res.ok){
        fermerDetail();
        chargerPlanning();
      }else{
        alert("Suppression impossible");
      }
    })
    .catch(()=>alert("Erreur lors de la suppression."));
}

function formaterTelephoneSMS(numero){
  let n = String(numero || "")
    .trim()
    .replace(/\s/g,"")
    .replace(/\./g,"")
    .replace(/-/g,"")
    .replace(/\(/g,"")
    .replace(/\)/g,"");

  if(!n) return "";

  if(n.startsWith("+33")) return n;
  if(n.startsWith("0033")) return "+33" + n.substring(4);
  if(n.startsWith("33")) return "+33" + n.substring(2);
  if(n.startsWith("0")) return "+33" + n.substring(1);
  if(n.startsWith("6") || n.startsWith("7")) return "+33" + n;

  return n;
}

function formuleClientSMS(rdv){
  const nom = rdv.client || "";
  const civ = rdv.civilite || "";

  if(civ === "Madame") return "Mme " + nom;
  if(civ === "Monsieur") return "M. " + nom;

  return nom;
}

function formatDateFRSMS(dateIso){
  if(!dateIso) return "";
  const p = String(dateIso).split("-");
  if(p.length === 3){
    return p[2] + "/" + p[1] + "/" + p[0];
  }
  return dateIso;
}

function ouvrirSmsManuel(numero, message){
  const tel = formaterTelephoneSMS(numero);

  if(!tel){
    alert("Aucun téléphone valide pour ce client.");
    return;
  }

  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if(isMobile){
    window.location.href = "sms:" + tel + "?body=" + encodeURIComponent(message);
    return;
  }

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(message).then(()=>{
      alert(
        "Planning ouvert sur PC.\n\n" +
        "Le message SMS a été copié.\n\n" +
        "Numéro client : " + tel + "\n\n" +
        "Tu peux le coller dans ton logiciel SMS ou l'envoyer depuis une tablette."
      );
    }).catch(()=>{
      prompt("Copie ce SMS pour le client " + tel + " :", message);
    });
  }else{
    prompt("Copie ce SMS pour le client " + tel + " :", message);
  }
}

  if(!rdvSelectionne){

  const tel = formaterTelephoneSMS(rdvSelectionne.telephone);

  if(!tel){
    alert("Aucun téléphone renseigné pour ce client.");

  const message =
`ADN CAMPER

Bonjour ${formuleClientSMS(rdvSelectionne)},

Rendez-vous confirmé le ${formatDateFRSMS(rdvSelectionne.date)} à ${rdvSelectionne.heure}.

${rdvSelectionne.technicien} prendra en charge votre intervention.

A bientôt.

L'équipe ADN CAMPER`;

  if(!confirm("Préparer le SMS de confirmation RDV à " + tel + " ?")){
    return;

}

function ouvrirCourtoisie(){
  const lundi=lundiDeLaSemaine(dateBase);

  courtoisieContent.innerHTML="";

  for(let i=0;i<6;i++){
    const j=new Date(lundi);
    j.setDate(lundi.getDate()+i);

    const dt=formatDate(j);

    let html=`<div class="courtoisie-day"><h3>${joursNoms[i]} ${formatFR(j)}</h3>`;

    vehiculesCourtoisie.forEach(v=>{
      const resa=interventions.find(x=>x.date===dt&&x.courtoisie===v);

      html+=resa
        ? `<div class="courtoisie-line occupe"><b>🚗 ${v} : Réservé</b><br>${resa.client||""}<br>${resa.heure||""}</div>`
        : `<div class="courtoisie-line libre"><b>🚗 ${v} : Libre</b></div>`;
    });

    html+=`</div>`;

    courtoisieContent.innerHTML+=html;
  }

  modalCourtoisie.style.display="flex";
}

function fermerCourtoisie(){
  modalCourtoisie.style.display="none";
}

function chargeJour(tech,jour){
  let total = 0;

  interventions
    .filter(i=>i.technicien===tech)
    .forEach(i=>{
      const segments = genererSegments(i);
      segments.forEach(s=>{
        if(s.date === jour){
          total += s.minutes / 60;
        }
      });
    });

  return total;
}

function changerSemaine(nb){
  dateBase.setDate(dateBase.getDate()+nb);
  afficher();
}

}
