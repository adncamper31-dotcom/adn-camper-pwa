<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning ADN Camper</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
header{background:#111827;color:white;padding:16px;text-align:center}
.container{padding:12px;max-width:1700px;margin:auto}
.card{background:white;border-radius:16px;padding:12px;margin-bottom:12px;box-shadow:0 4px 14px #0002}
.topbar{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}
button{background:#111827;color:white;border:0;border-radius:10px;padding:10px 14px;font-weight:bold;cursor:pointer}
button.secondary{background:#2563eb}
button.green{background:#16a34a}
button.danger{background:#dc2626}
.planning{overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:4px}
th{background:#111827;color:white;border-radius:10px;padding:8px;min-width:175px}
td{background:#f9fafb;border-radius:8px;vertical-align:top;padding:5px;height:62px;border:1px solid #e5e7eb}
td.slot{cursor:pointer}
td.slot:hover{outline:2px dashed #2563eb;background:#eff6ff}
.hour{background:#e5e7eb;font-weight:bold;text-align:center;width:70px;min-width:70px}
.event{border-radius:10px;padding:8px;font-size:13px;margin-bottom:5px;box-shadow:0 2px 6px #0002;cursor:pointer}
.event b{font-size:14px}
.Maxime{background:#bfdbfe;border-left:5px solid #2563eb}
.Joël{background:#bbf7d0;border-left:5px solid #16a34a}
.Guillaume{background:#fed7aa;border-left:5px solid #f97316}
.Gaël{background:#fecaca;border-left:5px solid #dc2626}
.badge{display:inline-block;padding:3px 7px;border-radius:999px;background:#e5e7eb;font-size:12px;margin:2px}
.badge-ok{background:#dcfce7;color:#166534}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}
.modal{display:none;position:fixed;inset:0;background:#0008;z-index:99;align-items:center;justify-content:center;padding:12px}
.modal-content{background:white;border-radius:18px;padding:18px;max-width:850px;width:100%;box-shadow:0 10px 30px #0005;max-height:90vh;overflow:auto}
.formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
input,select,textarea{width:100%;padding:11px;border-radius:10px;border:1px solid #d1d5db;font-size:15px;box-sizing:border-box}
textarea{min-height:90px}
.actions{display:flex;gap:8px;margin-top:12px}
.actions button{flex:1}
.legend{display:flex;gap:10px;flex-wrap:wrap}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:5px}
.courtoisie-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.courtoisie-day{background:#f9fafb;border-radius:12px;padding:10px;border:1px solid #e5e7eb}
.courtoisie-line{padding:8px;border-radius:10px;margin:6px 0}
.libre{background:#dcfce7;color:#166534}
.occupe{background:#fee2e2;color:#991b1b}
@media(max-width:700px){
  th{min-width:145px}
  td{height:75px}
  .event{font-size:12px}
}
</style>
</head>

<body>

<header>
  <h1>Planning ADN Camper</h1>
  <p>Vue semaine atelier • Google Sheets • Google Agenda</p>
</header>

<div class="container">

  <div class="card topbar">
    <button onclick="changerSemaine(-7)">← Semaine précédente</button>
    <button class="secondary" onclick="aujourdhui()">Aujourd'hui</button>
    <button onclick="changerSemaine(7)">Semaine suivante →</button>
    <button class="secondary" onclick="ouvrirFormulaire()">+ Ajouter RDV</button>
    <button class="green" onclick="ouvrirCourtoisie()">🚗 Courtoisie</button>
    <strong id="titreSemaine"></strong>
  </div>

  <div class="card legend">
    <span><span class="dot" style="background:#2563eb"></span>Maxime</span>
    <span><span class="dot" style="background:#16a34a"></span>Joël</span>
    <span><span class="dot" style="background:#f97316"></span>Guillaume</span>
    <span><span class="dot" style="background:#dc2626"></span>Gaël</span>
  </div>

  <div class="card planning">
    <table>
      <thead><tr id="joursHeader"></tr></thead>
      <tbody id="planningBody"></tbody>
    </table>
  </div>

</div>

<div id="modalForm" class="modal">
  <div class="modal-content">
    <h2>Ajouter un rendez-vous</h2>

    <div class="formgrid">
      <input id="client" placeholder="Client *">
      <input id="telephone" placeholder="Téléphone">
      <input id="vehicule" placeholder="Véhicule">
      <input id="date" type="date">
      <input id="heure" type="time">

      <select id="duree">
        <option value="1">1h</option>
        <option value="2">2h</option>
        <option value="3">3h</option>
        <option value="4">4h</option>
        <option value="7">1 journée</option>
        <option value="14">2 journées</option>
        <option value="21">3 journées</option>
      </select>

      <select id="technicien">
        <option value="">Technicien *</option>
        <option>Maxime</option>
        <option>Joël</option>
        <option>Guillaume</option>
        <option>Gaël</option>
      </select>

      <select id="courtoisie">
        <option>Aucun</option>
        <option>Berlingo</option>
        <option>208</option>
        <option>Up</option>
      </select>

      <select id="statut">
        <option>À faire</option>
        <option>En cours</option>
        <option>Terminé</option>
        <option>En attente pièces</option>
      </select>
    </div>

    <textarea id="travaux" placeholder="Travaux à réaliser"></textarea>

    <div class="actions">
      <button onclick="fermerFormulaire()">Annuler</button>
      <button class="secondary" onclick="ajouter()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="modalDetail" class="modal">
  <div class="modal-content">
    <h2>Détails du rendez-vous</h2>
    <div id="detailContent"></div>
    <div class="actions">
      <button onclick="fermerDetail()">Fermer</button>
    </div>
  </div>
</div>

<div id="modalCourtoisie" class="modal">
  <div class="modal-content">
    <h2>🚗 Disponibilités véhicules de courtoisie</h2>
    <div id="courtoisieContent" class="courtoisie-grid"></div>
    <div class="actions">
      <button onclick="fermerCourtoisie()">Fermer</button>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyxITbrdJyGvjWeXWCWA_TFDS7x4Khpeo8jNp4UhEJRjY_le2NDumuHhR-Qkvfeg0-X/exec";

let interventions = [];
let dateBase = new Date();

const joursNoms = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const vehiculesCourtoisie = ["Berlingo","208","Up"];

const heures = [
  "08:30","09:00","09:30","10:00","10:30","11:00","11:30",
  "12:00",
  "13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00"
];

function lundiDeLaSemaine(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

function formatDate(d){
  return d.toISOString().split("T")[0];
}

function formatFR(d){
  return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});
}

function normaliserDate(v){
  if(!v) return "";
  if(typeof v === "string" && v.includes("-")) return v;
  const d = new Date(v);
  if(isNaN(d)) return v;
  return formatDate(d);
}

function chargerPlanning(){
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {
      interventions = data.map(x => ({
        id: x.ID,
        date: normaliserDate(x.Date),
        heure: x.Heure,
        client: x.Client,
        vehicule: x["Véhicule"],
        telephone: x["Téléphone"],
        travaux: x.Travaux,
        technicien: x.Technicien,
        duree: Number(x["Durée"]),
        courtoisie: x.Courtoisie,
        statut: x.Statut
      }));
      afficher();
    })
    .catch(() => alert("Impossible de charger le planning Google Sheets."));
}

function afficher(){
  const lundi = lundiDeLaSemaine(dateBase);
  const header = document.getElementById("joursHeader");
  const body = document.getElementById("planningBody");

  header.innerHTML = "<th>Heure</th>";
  body.innerHTML = "";

  const fin = new Date(lundi);
  fin.setDate(lundi.getDate()+5);

  document.getElementById("titreSemaine").innerText =
    "Semaine du " + formatFR(lundi) + " au " + formatFR(fin);

  let dates = [];

  for(let i=0;i<6;i++){
    const jour = new Date(lundi);
    jour.setDate(lundi.getDate()+i);
    const dateTxt = formatDate(jour);
    dates.push(dateTxt);
    header.innerHTML += `<th>${joursNoms[i]}<br>${formatFR(jour)}</th>`;
  }

  heures.forEach(h => {
    let ligne = `<tr><td class="hour">${h}</td>`;

    dates.forEach(dateTxt => {
      const rdvs = interventions.filter(x =>
        x.date === dateTxt &&
        (x.heure || "").slice(0,5) === h
      );

      ligne += `<td class="slot" onclick="ouvrirDepuisCreneau('${dateTxt}','${h}')">`;

      rdvs.forEach(r => {
        ligne += `
          <div class="event ${r.technicien}" onclick="event.stopPropagation();ouvrirDetail('${r.id}')">
            <b>${r.heure || h} - ${r.client || ""}</b><br>
            ${r.vehicule || ""}<br>
            ${r.travaux || ""}<br>
            <span class="badge">${r.technicien || ""}</span>
            <span class="badge">${r.duree || 1}h</span>
            ${r.courtoisie && r.courtoisie !== "Aucun" ? `<span class="badge">🚗 ${r.courtoisie}</span>` : ""}
          </div>
        `;
      });

      ligne += `</td>`;
    });

    ligne += `</tr>`;
    body.innerHTML += ligne;
  });
}

function ouvrirDepuisCreneau(dateChoisie, heureChoisie){
  viderFormulaire();
  document.getElementById("date").value = dateChoisie;
  document.getElementById("heure").value = heureChoisie;
  document.getElementById("modalForm").style.display = "flex";
}

function ouvrirFormulaire(){
  viderFormulaire();
  document.getElementById("modalForm").style.display = "flex";
}

function fermerFormulaire(){
  document.getElementById("modalForm").style.display = "none";
}

function viderFormulaire(){
  client.value = "";
  telephone.value = "";
  vehicule.value = "";
  travaux.value = "";
  date.value = "";
  heure.value = "";
  duree.value = "1";
  technicien.value = "";
  courtoisie.value = "Aucun";
  statut.value = "À faire";
}

function ajouter(){
  const item = {
    id: Date.now(),
    client: client.value.trim(),
    telephone: telephone.value.trim(),
    vehicule: vehicule.value.trim(),
    travaux: travaux.value.trim(),
    date: date.value,
    heure: heure.value,
    duree: Number(duree.value),
    technicien: technicien.value,
    courtoisie: courtoisie.value,
    statut: statut.value
  };

  if(!item.client || !item.date || !item.heure || !item.technicien){
    alert("Il faut au minimum client, date, heure et technicien.");
    return;
  }

  if(item.courtoisie && item.courtoisie !== "Aucun"){
    const conflit = interventions.find(i =>
      i.date === item.date &&
      i.courtoisie === item.courtoisie
    );

    if(conflit){
      alert(
        "ATTENTION\n\n" +
        "Le véhicule " + item.courtoisie + " est déjà réservé ce jour-là.\n\n" +
        "Client : " + conflit.client + "\n" +
        "Véhicule : " + (conflit.vehicule || "") + "\n\n" +
        "Choisis un autre véhicule ou une autre date."
      );
      return;
    }
  }

  const chargeExistante = chargeJour(item.technicien, item.date);
  const chargeNouvelle = chargeExistante + item.duree;

  if(chargeNouvelle > 7){
    if(!confirm(
      "ATTENTION\n\n" +
      item.technicien + " sera chargé à " + chargeNouvelle + "h ce jour-là.\n\n" +
      "Continuer quand même ?"
    )) return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      ID: item.id,
      Date: item.date,
      Heure: item.heure,
      Client: item.client,
      "Véhicule": item.vehicule,
      "Téléphone": item.telephone,
      Travaux: item.travaux,
      Technicien: item.technicien,
      "Durée": item.duree,
      Courtoisie: item.courtoisie,
      Statut: item.statut
    })
  })
  .then(() => {
    fermerFormulaire();
    chargerPlanning();
  })
  .catch(() => alert("Erreur lors de l'enregistrement."));
}

function ouvrirDetail(id){
  const r = interventions.find(x => String(x.id) === String(id));
  if(!r) return;

  document.getElementById("detailContent").innerHTML = `
    <p><b>Client :</b> ${r.client || ""}</p>
    <p><b>Téléphone :</b> ${r.telephone || ""}</p>
    <p><b>Véhicule :</b> ${r.vehicule || ""}</p>
    <p><b>Date / Heure :</b> ${r.date || ""} à ${r.heure || ""}</p>
    <p><b>Durée :</b> ${r.duree || ""}h</p>
    <p><b>Technicien :</b> ${r.technicien || ""}</p>
    <p><b>Courtoisie :</b> ${r.courtoisie || "Aucun"}</p>
    <p><b>Statut :</b> ${r.statut || ""}</p>
    <p><b>Travaux :</b><br>${r.travaux || ""}</p>
  `;

  document.getElementById("modalDetail").style.display = "flex";
}

function fermerDetail(){
  document.getElementById("modalDetail").style.display = "none";
}

function ouvrirCourtoisie(){
  const lundi = lundiDeLaSemaine(dateBase);
  const content = document.getElementById("courtoisieContent");
  content.innerHTML = "";

  for(let i=0;i<6;i++){
    const jour = new Date(lundi);
    jour.setDate(lundi.getDate()+i);
    const dateTxt = formatDate(jour);

    let html = `<div class="courtoisie-day"><h3>${joursNoms[i]} ${formatFR(jour)}</h3>`;

    vehiculesCourtoisie.forEach(v => {
      const resa = interventions.find(x => x.date === dateTxt && x.courtoisie === v);

      if(resa){
        html += `
          <div class="courtoisie-line occupe">
            <b>🚗 ${v} : Réservé</b><br>
            ${resa.client || ""}<br>
            ${resa.vehicule || ""}<br>
            ${resa.heure || ""}
          </div>
        `;
      } else {
        html += `
          <div class="courtoisie-line libre">
            <b>🚗 ${v} : Libre</b>
          </div>
        `;
      }
    });

    html += `</div>`;
    content.innerHTML += html;
  }

  document.getElementById("modalCourtoisie").style.display = "flex";
}

function fermerCourtoisie(){
  document.getElementById("modalCourtoisie").style.display = "none";
}

function chargeJour(tech, jour){
  return interventions
    .filter(i => i.technicien === tech && i.date === jour)
    .reduce((total, i) => total + Number(i.duree || 0), 0);
}

function changerSemaine(nb){
  dateBase.setDate(dateBase.getDate()+nb);
  afficher();
}

function aujourdhui(){
  dateBase = new Date();
  afficher();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

chargerPlanning();
</script>

</body>
</html>
