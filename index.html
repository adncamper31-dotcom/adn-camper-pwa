<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning ADN Camper</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111827" />

  <style>
    body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
    header{background:#111827;color:white;padding:18px;text-align:center}
    .container{padding:14px;max-width:1500px;margin:auto}
    .card{background:white;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 4px 14px #0002}
    input,select,textarea,button{width:100%;padding:11px;margin:5px 0;border-radius:10px;border:1px solid #d1d5db;font-size:15px;box-sizing:border-box}
    button{background:#111827;color:white;font-weight:bold;cursor:pointer}
    .formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
    .topbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .topbar button{width:auto;padding:10px 14px}
    .planning{overflow-x:auto}
    table{width:100%;border-collapse:separate;border-spacing:8px}
    th{background:#111827;color:white;border-radius:12px;padding:10px;min-width:150px}
    td{background:#f9fafb;border-radius:12px;vertical-align:top;padding:8px;min-height:120px}
    .task{background:white;border-left:6px solid #111827;border-radius:12px;padding:10px;margin-bottom:8px;box-shadow:0 2px 8px #0001;font-size:14px}
    .badge{display:inline-block;padding:4px 8px;border-radius:20px;background:#e5e7eb;margin:2px;font-size:12px}
    .ok{background:#dcfce7;color:#166534}
    .danger{background:#fee2e2;color:#991b1b}
    .wait{background:#fef3c7;color:#92400e}
    .hidden{display:none}
    .tech-Maxime{border-left-color:#2563eb}
    .tech-Joël{border-left-color:#16a34a}
    .tech-Guillaume{border-left-color:#f97316}
    .tech-Gaël{border-left-color:#dc2626}
    .charge0{background:#dcfce7;color:#166534}
    .charge1{background:#fef3c7;color:#92400e}
    .charge2{background:#fee2e2;color:#991b1b}
    .mini{font-size:12px;color:#374151}
  </style>
</head>

<body>

<header>
  <h1>Planning ADN Camper</h1>
  <p>Atelier • Techniciens • Véhicules de courtoisie</p>
</header>

<div class="container">

  <div class="card">
    <div class="topbar">
      <button onclick="afficherVue('semaine')">📅 Semaine</button>
      <button onclick="afficherVue('dispos')">📊 Disponibilités</button>
      <button onclick="afficherVue('complet')">🗓️ Planning complet 30 jours</button>
      <button onclick="changerSemaine(-7)">← Semaine précédente</button>
      <button onclick="aujourdhui()">Aujourd'hui</button>
      <button onclick="changerSemaine(7)">Semaine suivante →</button>
      <strong id="titreSemaine"></strong>
    </div>
  </div>

  <div class="card">
    <h2>Ajouter une intervention</h2>

    <div class="formgrid">
      <input id="client" placeholder="Client">
      <input id="vehicule" placeholder="Véhicule">
      <input id="telephone" placeholder="Téléphone">
      <input id="date" type="date">
      <input id="heure" type="time">

      <select id="duree">
        <option value="1">1h</option>
        <option value="2">2h</option>
        <option value="3">3h</option>
        <option value="4">4h</option>
        <option value="7">1 journée</option>
        <option value="14">2 journées</option>
        <option value="21">3 journées</option>
      </select>

      <select id="technicien">
        <option value="">Technicien</option>
        <option>Maxime</option>
        <option>Joël</option>
        <option>Guillaume</option>
        <option>Gaël</option>
      </select>

      <select id="courtoisie">
        <option value="">Courtoisie</option>
        <option>Aucun</option>
        <option>Berlingo</option>
        <option>208</option>
        <option>Up</option>
      </select>

      <select id="statut">
        <option>À faire</option>
        <option>En cours</option>
        <option>Terminé</option>
        <option>En attente pièces</option>
      </select>
    </div>

    <textarea id="travaux" placeholder="Travaux à réaliser"></textarea>
    <button onclick="ajouter()">Ajouter au planning</button>
  </div>

  <div id="vueSemaine" class="card planning">
    <h2>Planning semaine</h2>
    <table>
      <thead><tr id="joursHeader"></tr></thead>
      <tbody><tr id="joursBody"></tr></tbody>
    </table>
  </div>

  <div id="vueDispos" class="card planning hidden">
    <h2>Disponibilités atelier</h2>
    <div id="premiersCreneaux"></div>
    <table>
      <thead>
        <tr>
          <th>Technicien</th>
          <th>Aujourd'hui</th>
          <th>Demain</th>
          <th>Cette semaine</th>
          <th>Premier jour disponible</th>
        </tr>
      </thead>
      <tbody id="tableDispos"></tbody>
    </table>
  </div>

  <div id="vueComplet" class="card planning hidden">
    <h2>Planning complet 30 jours</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Maxime</th>
          <th>Joël</th>
          <th>Guillaume</th>
          <th>Gaël</th>
          <th>Véhicules courtoisie</th>
        </tr>
      </thead>
      <tbody id="tableComplet"></tbody>
    </table>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyxITbrdJyGvjWeXWCWA_TFDS7x4Khpeo8jNp4UhEJRjY_le2NDumuHhR-Qkvfeg0-X/exec";

let interventions = [];
let dateBase = new Date();
let vueActuelle = "semaine";

const techniciens = ["Maxime","Joël","Guillaume","Gaël"];
const joursNoms = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];

function afficherVue(vue){
  vueActuelle = vue;
  document.getElementById("vueSemaine").classList.add("hidden");
  document.getElementById("vueDispos").classList.add("hidden");
  document.getElementById("vueComplet").classList.add("hidden");

  if(vue === "semaine") document.getElementById("vueSemaine").classList.remove("hidden");
  if(vue === "dispos") document.getElementById("vueDispos").classList.remove("hidden");
  if(vue === "complet") document.getElementById("vueComplet").classList.remove("hidden");

  afficher();
}

function lundiDeLaSemaine(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

function formatDate(d){
  return d.toISOString().split("T")[0];
}

function formatFR(d){
  return d.toLocaleDateString("fr-FR", {weekday:"short", day:"2-digit", month:"2-digit"});
}

function normaliserDate(valeur){
  if(!valeur) return "";
  if(typeof valeur === "string" && valeur.includes("-")) return valeur;
  const d = new Date(valeur);
  if(isNaN(d)) return valeur;
  return formatDate(d);
}

function chargerPlanning(){
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {
      interventions = data.map(x => ({
        id: x.ID,
        date: normaliserDate(x.Date),
        heure: x.Heure,
        client: x.Client,
        vehicule: x["Véhicule"],
        telephone: x["Téléphone"],
        travaux: x.Travaux,
        technicien: x.Technicien,
        duree: Number(x["Durée"]),
        courtoisie: x.Courtoisie,
        statut: x.Statut
      }));
      afficher();
    })
    .catch(() => alert("Impossible de charger le planning Google Sheets."));
}

function ajouter(){
  const item = {
    id: Date.now(),
    client: client.value.trim(),
    vehicule: vehicule.value.trim(),
    telephone: telephone.value.trim(),
    travaux: travaux.value.trim(),
    date: date.value,
    heure: heure.value,
    duree: Number(duree.value),
    technicien: technicien.value,
    courtoisie: courtoisie.value,
    statut: statut.value
  };

  if(!item.client || !item.date || !item.technicien){
    alert("Il faut au minimum le client, la date et le technicien.");
    return;
  }

  if(item.courtoisie && item.courtoisie !== "Aucun"){
    const conflitVehicule = interventions.find(i =>
      i.date === item.date &&
      i.courtoisie === item.courtoisie
    );

    if(conflitVehicule){
      alert(
        "ATTENTION\n\n" +
        "Le véhicule " + item.courtoisie + " est déjà réservé le " + item.date + ".\n\n" +
        "Client déjà prévu : " + conflitVehicule.client + "\n\n" +
        "Choisis un autre véhicule ou une autre date."
      );
      return;
    }
  }

  const chargeExistante = chargeJour(item.technicien, item.date);
  const chargeNouvelle = chargeExistante + item.duree;

  if(chargeNouvelle > 7){
    const continuer = confirm(
      "ATTENTION\n\n" +
      item.technicien + " est déjà chargé à " + chargeExistante + "h ce jour-là.\n" +
      "Avec cette intervention, il passera à " + chargeNouvelle + "h.\n\n" +
      "Veux-tu quand même enregistrer ?"
    );
    if(!continuer) return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      ID: item.id,
      Date: item.date,
      Heure: item.heure,
      Client: item.client,
      "Véhicule": item.vehicule,
      "Téléphone": item.telephone,
      Travaux: item.travaux,
      Technicien: item.technicien,
      "Durée": item.duree,
      Courtoisie: item.courtoisie,
      Statut: item.statut
    })
  })
  .then(() => {
    document.querySelectorAll("input, textarea").forEach(e => e.value = "");
    chargerPlanning();
  })
  .catch(() => alert("Erreur lors de l'enregistrement."));
}

function afficher(){
  afficherSemaine();
  afficherDispos();
  afficherComplet();
}

function afficherSemaine(){
  const lundi = lundiDeLaSemaine(dateBase);
  const header = document.getElementById("joursHeader");
  const body = document.getElementById("joursBody");

  header.innerHTML = "";
  body.innerHTML = "";

  const fin = new Date(lundi);
  fin.setDate(lundi.getDate()+5);
  titreSemaine.innerText = "Semaine du " + formatFR(lundi) + " au " + formatFR(fin);

  for(let i=0;i<6;i++){
    const jour = new Date(lundi);
    jour.setDate(lundi.getDate()+i);
    const dateTxt = formatDate(jour);

    header.innerHTML += `<th>${joursNoms[i]}<br>${formatFR(jour)}</th>`;

    const taches = interventions
      .filter(x => x.date === dateTxt)
      .sort((a,b) => (a.heure || "").localeCompare(b.heure || ""));

    let contenu = "";

    if(taches.length === 0){
      contenu = `<span class="badge">Aucune intervention</span>`;
    } else {
      taches.forEach(t => {
        const charge = chargeJour(t.technicien, t.date);
        const classe = t.statut === "En attente pièces" ? "wait" : charge > 7 ? "danger" : "ok";

        contenu += `
          <div class="task tech-${t.technicien}">
            <b>${t.heure || "--:--"} - ${t.client}</b><br>
            ${t.vehicule || ""}<br>
            ${t.travaux || ""}<br>
            <span class="badge">${t.technicien}</span>
            <span class="badge">${t.duree}h</span>
            <span class="badge">${t.courtoisie || "Aucun véhicule"}</span>
            <span class="badge ${classe}">${t.statut}</span>
            ${charge > 7 ? '<span class="badge danger">Surcharge ' + t.technicien + '</span>' : ''}
          </div>
        `;
      });
    }

    body.innerHTML += `<td>${contenu}</td>`;
  }
}

function afficherDispos(){
  const tbody = document.getElementById("tableDispos");
  const premiers = document.getElementById("premiersCreneaux");
  tbody.innerHTML = "";
  premiers.innerHTML = "";

  const aujourd = formatDate(new Date());
  const demainDate = new Date();
  demainDate.setDate(demainDate.getDate()+1);
  const demain = formatDate(demainDate);

  let resume = "<p><b>Premiers créneaux disponibles :</b></p>";

  techniciens.forEach(t => {
    const chargeAuj = chargeJour(t, aujourd);
    const chargeDem = chargeJour(t, demain);
    const chargeSem = chargeSemaine(t, dateBase);
    const premier = premierJourDisponible(t);

    resume += `<span class="badge ok">${t} : ${formatFR(new Date(premier))}</span>`;

    tbody.innerHTML += `
      <tr>
        <td><b>${t}</b></td>
        <td><span class="badge ${classeCharge(chargeAuj)}">${chargeAuj}h / 7h</span></td>
        <td><span class="badge ${classeCharge(chargeDem)}">${chargeDem}h / 7h</span></td>
        <td><span class="badge">${chargeSem}h</span></td>
        <td><span class="badge ok">${formatFR(new Date(premier))}</span></td>
      </tr>
    `;
  });

  premiers.innerHTML = resume;
}

function afficherComplet(){
  const tbody = document.getElementById("tableComplet");
  tbody.innerHTML = "";

  const depart = new Date();
  for(let i=0;i<30;i++){
    const jour = new Date(depart);
    jour.setDate(depart.getDate()+i);

    const day = jour.getDay();
    if(day === 0) continue;

    const dateTxt = formatDate(jour);

    let ligne = `<tr><td><b>${formatFR(jour)}</b></td>`;

    techniciens.forEach(t => {
      const charge = chargeJour(t, dateTxt);
      const taches = interventions.filter(x => x.date === dateTxt && x.technicien === t);

      let contenu = `<span class="badge ${classeCharge(charge)}">${charge}h / 7h</span>`;
      taches.forEach(x => {
        contenu += `<div class="mini">${x.client} - ${x.vehicule || ""}</div>`;
      });

      ligne += `<td>${contenu}</td>`;
    });

    const vehicules = interventions
      .filter(x => x.date === dateTxt && x.courtoisie && x.courtoisie !== "Aucun")
      .map(x => `<span class="badge danger">${x.courtoisie} - ${x.client}</span>`)
      .join("");

    ligne += `<td>${vehicules || '<span class="badge ok">Aucun réservé</span>'}</td>`;
    ligne += `</tr>`;

    tbody.innerHTML += ligne;
  }
}

function chargeJour(tech, jour){
  return interventions
    .filter(i => i.technicien === tech && i.date === jour)
    .reduce((total, i) => total + Number(i.duree || 0), 0);
}

function chargeSemaine(tech, base){
  const lundi = lundiDeLaSemaine(base);
  let total = 0;
  for(let i=0;i<6;i++){
    const jour = new Date(lundi);
    jour.setDate(lundi.getDate()+i);
    total += chargeJour(tech, formatDate(jour));
  }
  return total;
}

function premierJourDisponible(tech){
  const d = new Date();
  for(let i=0;i<60;i++){
    const jour = new Date(d);
    jour.setDate(d.getDate()+i);
    const day = jour.getDay();

    if(day !== 0 && chargeJour(tech, formatDate(jour)) < 7){
      return formatDate(jour);
    }
  }
  return formatDate(d);
}

function classeCharge(charge){
  if(charge >= 7) return "charge2";
  if(charge >= 5) return "charge1";
  return "charge0";
}

function changerSemaine(nb){
  dateBase.setDate(dateBase.getDate()+nb);
  afficher();
}

function aujourdhui(){
  dateBase = new Date();
  afficher();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

chargerPlanning();
</script>

</body>
</html>
