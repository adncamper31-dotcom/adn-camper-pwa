<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning ADN Camper</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111827" />
  <style>
    body{margin:0;font-family:Arial;background:#f3f4f6;color:#111827}
    header{background:#111827;color:white;padding:18px;text-align:center}
    .container{padding:16px;max-width:1200px;margin:auto}
    .card{background:white;border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 4px 12px #0001}
    input,select,textarea,button{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #ddd;font-size:16px}
    button{background:#111827;color:white;font-weight:bold;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
    .task{border-left:6px solid #111827;background:#f9fafb;padding:12px;border-radius:10px;margin:8px 0}
    .badge{display:inline-block;padding:4px 8px;border-radius:20px;background:#e5e7eb;margin:3px;font-size:13px}
    .danger{background:#fee2e2;color:#991b1b}
    .ok{background:#dcfce7;color:#166534}
    .warn{background:#fef3c7;color:#92400e}
  </style>
</head>
<body>

<header>
  <h1>Planning ADN Camper</h1>
  <p>Atelier • Techniciens • Véhicules de courtoisie</p>
</header>

<div class="container">

  <div class="card">
    <h2>Ajouter une intervention</h2>

    <input id="client" placeholder="Nom du client">
    <input id="vehicule" placeholder="Véhicule client">
    <input id="telephone" placeholder="Téléphone">
    <textarea id="travaux" placeholder="Travaux à réaliser"></textarea>

    <input id="date" type="date">
    <input id="heure" type="time">

    <select id="duree">
      <option value="1">Durée estimée : 1h</option>
      <option value="2">2h</option>
      <option value="3">3h</option>
      <option value="4">4h</option>
      <option value="7">1 journée</option>
      <option value="14">2 journées</option>
      <option value="21">3 journées</option>
    </select>

    <select id="technicien">
      <option value="">Technicien</option>
      <option>Maxime</option>
      <option>Joël</option>
      <option>Guillaume</option>
      <option>Gaël</option>
    </select>

    <select id="courtoisie">
      <option value="">Véhicule de courtoisie</option>
      <option>Aucun</option>
      <option>Berlingo</option>
      <option>208</option>
      <option>Up</option>
    </select>

    <select id="statut">
      <option>À faire</option>
      <option>En cours</option>
      <option>Terminé</option>
      <option>En attente pièces</option>
    </select>

    <button onclick="ajouter()">Ajouter au planning</button>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Maxime</h2>
      <div id="Maxime"></div>
    </div>
    <div class="card">
      <h2>Joël</h2>
      <div id="Joël"></div>
    </div>
    <div class="card">
      <h2>Guillaume</h2>
      <div id="Guillaume"></div>
    </div>
    <div class="card">
      <h2>Gaël</h2>
      <div id="Gaël"></div>
    </div>
  </div>

</div>

<script>
let interventions = JSON.parse(localStorage.getItem("planningADN")) || [];

function ajouter(){
  const item = {
    id: Date.now(),
    client: client.value,
    vehicule: vehicule.value,
    telephone: telephone.value,
    travaux: travaux.value,
    date: date.value,
    heure: heure.value,
    duree: Number(duree.value),
    technicien: technicien.value,
    courtoisie: courtoisie.value,
    statut: statut.value
  };

  if(!item.client || !item.date || !item.technicien){
    alert("Il faut au minimum le client, la date et le technicien.");
    return;
  }

  interventions.push(item);
  localStorage.setItem("planningADN", JSON.stringify(interventions));
  afficher();

  document.querySelectorAll("input, textarea").forEach(e => e.value = "");
}

function afficher(){
  ["Maxime","Joël","Guillaume","Gaël"].forEach(t => {
    document.getElementById(t).innerHTML = "";
  });

  interventions
    .sort((a,b) => (a.date+a.heure).localeCompare(b.date+b.heure))
    .forEach(i => {
      const surcharge = chargeJour(i.technicien, i.date) > 7;
      const div = document.createElement("div");
      div.className = "task";
      div.innerHTML = `
        <strong>${i.date} ${i.heure || ""}</strong><br>
        <b>${i.client}</b> - ${i.vehicule || ""}<br>
        ${i.travaux || ""}<br>
        <span class="badge">${i.duree}h</span>
        <span class="badge">${i.statut}</span>
        <span class="badge">${i.courtoisie || "Aucun véhicule"}</span>
        ${surcharge ? '<span class="badge danger">Surcharge journée</span>' : '<span class="badge ok">OK</span>'}
        <button onclick="supprimer(${i.id})">Supprimer</button>
      `;
      document.getElementById(i.technicien).appendChild(div);
    });
}

function chargeJour(tech, jour){
  return interventions
    .filter(i => i.technicien === tech && i.date === jour)
    .reduce((total, i) => total + i.duree, 0);
}

function supprimer(id){
  if(confirm("Supprimer cette intervention ?")){
    interventions = interventions.filter(i => i.id !== id);
    localStorage.setItem("planningADN", JSON.stringify(interventions));
    afficher();
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

afficher();
</script>

</body>
</html>
